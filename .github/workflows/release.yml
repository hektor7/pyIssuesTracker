name: Build Release Executables

on:
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-20.04
            artifact_name: linux
            artifact_path: dist/PyIssuesTracker
            file_extension: ""
          - os: windows-latest
            artifact_name: windows
            artifact_path: dist/PyIssuesTracker.exe
            file_extension: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libglib2.0-0 libgl1-mesa-glx libegl1-mesa

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name PyIssuesTracker main.py

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum PyIssuesTracker${{ matrix.file_extension }} > PyIssuesTracker-${{ matrix.artifact_name }}.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact_path }}
            dist/PyIssuesTracker-${{ matrix.artifact_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
