name: Build Release Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: Install system deps
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3.10 python3.10-dev python3.10-venv python3-pip \
            libxcb-cursor0 libglib2.0-0 libgl1-mesa-glx libegl1-mesa \
            binutils git ca-certificates
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.10 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          pip3 install --upgrade pip
          pip3 install pyinstaller
          pip3 install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name PyIssuesTracker main.py

      - name: Generate checksums
        run: |
          cd dist
          sha256sum PyIssuesTracker > PyIssuesTracker-linux.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PyIssuesTracker
            dist/PyIssuesTracker-linux.sha256

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name PyIssuesTracker main.py

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum PyIssuesTracker.exe > PyIssuesTracker-windows.sha256

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PyIssuesTracker.exe
            dist/PyIssuesTracker-windows.sha256
